<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>真正联机·双人卡牌</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f4f7fa;padding:20px}
    .room{text-align:center;margin-bottom:20px}
    button{padding:8px 14px;margin:4px;background:#4285f4;color:white;border:none;border-radius:6px;cursor:pointer}
    input{padding:6px;width:80px}
    .hand{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0}
    .card{width:70px;height:100px;background:#fff;border:2px solid #333;border-radius:6px;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:bold;padding:4px}
    .selected{background:#ffeaea;border-color:red}
    .area{border:1px dashed #ccc;padding:16px;border-radius:8px;margin:16px 0;text-align:center}
  </style>
</head>
<body>

<div class="room">
  <div>房间号：<span id="roomId">-</span></div>
  <button id="create">创建房间</button>
  <input id="inputRoom" placeholder="输入房间号">
  <button id="join">加入房间</button>
  <button id="reset">重置</button>
</div>

<div class="area">
  <h3>我的手牌</h3>
  <div id="myHand" class="hand"></div>
  <button id="play">出牌</button>
</div>

<div class="area">
  <h3>对方打出的牌</h3>
  <div id="opponent" class="hand"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDI9fhfGUP6K5E-uFJaG1kEJz6LdFbf7gA",
  authDomain: "simple-card-99999.firebaseapp.com",
  databaseURL: "https://simple-card-99999-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "simple-card-99999",
  storageBucket: "simple-card-99999.appspot.com",
  messagingSenderId: "1069166669663",
  appId: "1:1069166669663:web:abcdef1234567890"
});

const db = getDatabase(app);

const cardPool = [
"朱志鑫","苏新皓","张极","张泽禹","左航","宋亚轩","张真源","刘耀文",
"丁程鑫","马嘉祺","严浩翔","贺峻霖","李天泽","敖子逸","黄宇航","林墨",
"邓佳鑫","穆祉丞","张峻豪","童禹坤","黄朔","zimo","张函瑞","张桂圆",
"杨博文","左奇函","王橹杰","陈浚铭","陈思罕","张奕然","魏子宸","李煜东",
"官俊臣","杨涵博","聂玮辰","陈奕恒","易烊千玺","王俊凯","王源",
"小新","肥嘟嘟左卫门","典娜","熊大","熊二","猪猪侠","权志龙","李飞","黄锐"
];

let roomId = null;
let isHost = false;
let myHand = [];
let selected = [];

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

// 创建房间
document.getElementById('create').onclick = async ()=>{
  roomId = prompt("设置房间号（如 1234）：");
  if(!roomId) return;
  isHost = true;
  document.getElementById('roomId').innerText = roomId;
  myHand = shuffle(cardPool).slice(0,10);
  await set(ref(db, 'rooms/'+roomId), {
    p1: [], p2: []
  });
  startSync();
  renderHand();
};

// 加入房间
document.getElementById('join').onclick = ()=>{
  roomId = document.getElementById('inputRoom').value.trim();
  if(!roomId) return alert("输入房间号");
  isHost = false;
  document.getElementById('roomId').innerText = roomId;
  myHand = shuffle(cardPool).slice(0,10);
  startSync();
  renderHand();
};

// 同步对方出牌
function startSync(){
  onValue(ref(db, 'rooms/'+roomId), snap=>{
    const d = snap.val();
    if(!d) return;
    const oppo = isHost ? d.p2 : d.p1;
    renderOppo(oppo);
  });
}

// 选牌
window.toggle = (card)=>{
  if(selected.includes(card)){
    selected = selected.filter(c=>c!==card);
  }else{
    if(selected.length>=4) return;
    selected.push(card);
  }
  renderHand();
};

// 出牌
document.getElementById('play').onclick = async ()=>{
  if(!roomId) return alert("请先进入房间");
  if(selected.length<1) return alert("至少选1张");
  const path = isHost ? 'p1' : 'p2';
  await update(ref(db, 'rooms/'+roomId), { [path]: selected });
  myHand = myHand.filter(c=>!selected.includes(c));
  selected = [];
  renderHand();
};

// 重置
document.getElementById('reset').onclick = async ()=>{
  if(!roomId) return;
  await set(ref(db, 'rooms/'+roomId), { p1:[], p2:[] });
};

// 渲染
function renderHand(){
  document.getElementById('myHand').innerHTML = myHand.map(c=>
    `<div class="card ${selected.includes(c)?'selected':''}" onclick="toggle('${c}')">${c}</div>`
  ).join('');
}
function renderOppo(cards){
  document.getElementById('opponent').innerHTML = cards.map(c=>
    `<div class="card">${c}</div>`
  ).join('');
}
</script>
</body>
</html>
