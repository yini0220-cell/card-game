<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>线上联机卡牌</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f4f7fa;padding:20px}
    .room{text-align:center;margin-bottom:20px}
    button{padding:10px 16px;margin:5px;background:#4285f4;color:white;border:none;border-radius:6px}
    .hand{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:20px 0}
    .card{width:70px;height:100px;background:white;border:2px solid #333;border-radius:6px;align-items:center;justify-content:center;text-align:center;font-weight:bold;padding:4px;display:flex}
    .selected{background:#ffeaea;border-color:red}
    .area{border:1px dashed #ccc;padding:15px;border-radius:8px;margin:10px 0}
  </style>
</head>
<body>

<div class="room">
  <div>房间号：<b id="roomId">-</b></div>
  <button id="create">创建房间</button>
  <input id="inputRoom" placeholder="输入房间号">
  <button id="join">加入房间</button>
  <button id="reset">重置本轮</button>
</div>

<div class="area">
  <h3 style="text-align:center">我的手牌</h3>
  <div id="myHand" class="hand"></div>
  <br>
  <button id="play">出牌（1-4张）</button>
</div>

<div class="area">
  <h3 style="text-align:center">对方出的牌</h3>
  <div id="opponentPlayed" class="hand"></div>
</div>

<script>
const cardPool = [
"朱志鑫","苏新皓","张极","张泽禹","左航","宋亚轩","张真源","刘耀文",
"丁程鑫","马嘉祺","严浩翔","贺峻霖","李天泽","敖子逸","黄宇航","林墨",
"邓佳鑫","穆祉丞","张峻豪","童禹坤","黄朔","zimo","张函瑞","张桂圆",
"杨博文","左奇函","王橹杰","陈浚铭","陈思罕","张奕然","魏子宸","李煜东",
"官俊臣","杨涵博","聂玮辰","陈奕恒","易烊千玺","王俊凯","王源",
"小新","肥嘟嘟左卫门","典娜","熊大","熊二","猪猪侠","权志龙","李飞","黄锐"
];

let roomId = null
let myHand = []
let selected = []
let playedCards = []

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5)
}

document.getElementById('create').onclick = ()=>{
  roomId = Math.random().toString(36).slice(2,6).toUpperCase()
  document.getElementById('roomId').innerText = roomId
  myHand = shuffle(cardPool).slice(0,10)
  render()
}

document.getElementById('join').onclick = ()=>{
  let v = document.getElementById('inputRoom').value.trim()
  if(!v)return alert('输入房间号')
  roomId = v
  document.getElementById('roomId').innerText = roomId
  myHand = shuffle(cardPool).slice(0,10)
  render()
}

function toggle(card){
  if(selected.includes(card)){
    selected = selected.filter(x=>x!==card)
  }else{
    if(selected.length>=4)return
    selected.push(card)
  }
  render()
}

document.getElementById('play').onclick = ()=>{
  if(selected.length<1)return alert('至少选1张')
  playedCards = [...selected]
  myHand = myHand.filter(c=>!selected.includes(c))
  selected = []
  render()
}

document.getElementById('reset').onclick = ()=>{
  selected = []
  playedCards = []
  render()
}

function render(){
  document.getElementById('myHand').innerHTML = myHand.map(c=>
    `<div class="card ${selected.includes(c)?'selected':''}" onclick="toggle('${c}')">${c}</div>`
  ).join('')
  document.getElementById('opponentPlayed').innerHTML = playedCards.map(c=>
    `<div class="card">${c}</div>`
  ).join('')
}

window.toggle = toggle
</script>
</body>
</html>
